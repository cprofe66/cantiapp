        .song-card { transition: all 0.2s ease; }

        #pdfModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 1000;

        .loader-container {

            <input

        <!-- Filtri -->

            <button onclick="setFilter('M')" id="btn-M" class="filter-btn px-4 py-2 rounded-full text-sm font-medium bg-white text-stone-600 ring-1 ring-stone-200 transition-colors">Uomini</button>

        <div id="resultsList" class="space-y-3 pb-20"></div>

        <div id="emptyState" class="hidden text-center py-12">

            <button id="directLinkBtn" class="bg-amber-600 text-white px-3 py-2 rounded-lg text-[10px] font-bold flex items-center gap-1 shadow-lg active:bg-amber-700">

        let currentFilter = 'all';
        const searchInput = document.getElementById('searchInput');
        const resultsList = document.getElementById('resultsList');
        const emptyState = document.getElementById('emptyState');

        function openPdf(fileName, title) {
            const pdfModal = document.getElementById('pdfModal');
            const pdfFrame = document.getElementById('pdfFrame');
            const songTitleDisplay = document.getElementById('songTitleDisplay');
            const directBtn = document.getElementById('directLinkBtn');
            
            const fullFileUrl = BASE_SITE_URL + folderPath + fileName;
            const viewerUrl = `https://docs.google.com/gview?embedded=true&url=${encodeURIComponent(fullFileUrl)}&t=${Date.now()}`;
            
            songTitleDisplay.innerText = title;
            pdfFrame.src = viewerUrl;
            pdfModal.style.display = 'flex';
            document.body.style.overflow = 'hidden';

            directBtn.onclick = () => {
                window.open(fullFileUrl, '_blank');
            };
        }

        function closePdf() {
            const pdfModal = document.getElementById('pdfModal');
            const pdfFrame = document.getElementById('pdfFrame');
            pdfFrame.src = "";
            pdfModal.style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function renderSongs() {
            const searchTerm = searchInput.value.toLowerCase().trim();
            const filtered = songDatabase.filter(song => {
                const matchesSearch = song.titolo.toLowerCase().includes(searchTerm) || song.tags.toLowerCase().includes(searchTerm);
                const matchesFilter = currentFilter === 'all' || song.tonalita === currentFilter;
                return matchesSearch && matchesFilter;
            });

            filtered.sort((a, b) => a.titolo.localeCompare(b.titolo));
            resultsList.innerHTML = '';
            
            if (filtered.length === 0) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
                filtered.forEach(song => {
                    const card = document.createElement('div');
                    card.className = "song-card bg-white p-4 rounded-xl shadow-sm border border-stone-100 flex items-center justify-between cursor-pointer active:bg-amber-50";
                    card.onclick = () => openPdf(song.fileName, song.titolo);
                    
                    const badgeColor = song.tonalita === 'M' ? 'bg-blue-100 text-blue-700' : 'bg-pink-100 text-pink-700';
                    const badgeLabel = song.tonalita === 'M' ? 'Uomo' : 'Donna';

                    card.innerHTML = `
                        <div class="flex-1 pr-4">
                            <h3 class="font-semibold text-stone-800 leading-tight">${song.titolo}</h3>
                            <span class="inline-block mt-1 px-2 py-0.5 rounded text-[10px] font-bold uppercase ${badgeColor}">
                                ${badgeLabel}
                            </span>
                        </div>
                        <div class="p-3 bg-amber-500 text-white rounded-full shadow-md">
                            <i data-lucide="eye" class="w-5 h-5"></i>
                        </div>
                    `;
                    resultsList.appendChild(card);
                });
            }
            lucide.createIcons();
        }

        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('bg-amber-500', 'text-white', 'shadow-md');
                btn.classList.add('bg-white', 'text-stone-600', 'ring-1', 'ring-stone-200');
            });
            document.getElementById(`btn-${filter}`).classList.add('bg-amber-500', 'text-white', 'shadow-md');
            renderSongs();
        }

        searchInput.addEventListener('input', renderSongs);
        window.onload = () => { renderSongs(); lucide.createIcons(); };
