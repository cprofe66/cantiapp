        :root {

        }

        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            scroll-behavior: smooth;
        }

        .song-card { transition: transform 0.1s ease, box-shadow 0.2s ease; }
        .song-card:active { transform: scale(0.98); }

        #pdfModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #171717;
            z-index: 1000;
            flex-direction: column;
        }
        
        #pdfContainer {
            width: 100%;
            flex-grow: 1;
            overflow: auto; 
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            -webkit-overflow-scrolling: touch;
        }

        canvas {
            display: block;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            background: white;
            border-radius: 4px;
        }

        #introOverlay {
            position: fixed;
            inset: 0;
            background: #1c1917; /* stone-900 */
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        #introOverlay.hidden-intro {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .filter-btn.active {
            background-color: var(--primary);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(245, 158, 11, 0.4);
            border-color: var(--primary);
        }

        #backToTop {
            display: none;
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 50;
        }

        .zoom-controls {
            display: flex;
            gap: 12px;
            background: rgba(38, 38, 38, 0.9);
            padding: 10px 16px;
            border-radius: 16px;
            backdrop-filter: blur(8px);
            margin-right: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        button:active {
            opacity: 0.7;
        }
    </style>

        async function openPdf(fileName, title) {
            document.getElementById('songTitleDisplay').innerText = title;
            pdfModal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
            pdfContainer.innerHTML = ''; 
            
            const url = BASE_SITE_URL + folderPath + fileName;
            document.getElementById('directLinkBtn').onclick = () => window.open(url, '_blank');

            try {
                document.getElementById('pdfLoader').style.display = 'flex';
                currentPdf = await pdfjsLib.getDocument(url).promise;
                
                // CALCOLO ZOOM INTELLIGENTE PER ADATTARSI ALLO SCHERMO
                const firstPage = await currentPdf.getPage(1);
                const originalViewport = firstPage.getViewport({ scale: 1.0 });
                // Calcoliamo lo zoom per coprire il 95% della larghezza dello schermo
                const targetWidth = window.innerWidth * 0.95;
                currentZoom = targetWidth / originalViewport.width;
                
                await renderPdfPages();
            } catch (e) {
                console.error(e);
                document.getElementById('pdfLoader').innerHTML = `<p class="text-white p-4 text-center">Impossibile caricare il canto.<br><span class="text-xs text-stone-500">Verifica la connessione internet</span></p>`;
            }
        }

        async function renderPdfPages() {
            if (isRendering || !currentPdf) return;
            isRendering = true;
            
            document.getElementById('pdfLoader').style.display = 'flex';
            pdfContainer.innerHTML = '';
            
            try {
                for (let i = 1; i <= currentPdf.numPages; i++) {
                    const page = await currentPdf.getPage(i);
                    const viewport = page.getViewport({ scale: currentZoom });
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;
                    
                    await page.render({ canvasContext: context, viewport }).promise;
                    pdfContainer.appendChild(canvas);
                }
            } catch (err) {
                console.error("Rendering error:", err);
            } finally {
                document.getElementById('pdfLoader').style.display = 'none';
                isRendering = false;
            }
        }

        function adjustZoom(delta) {
            if (isRendering) return;
            const nextZoom = currentZoom + delta;
            // Limiti di sicurezza per non rendere l'app instabile
            if (nextZoom >= 0.3 && nextZoom <= 4.0) {
                currentZoom = nextZoom;
                renderPdfPages();
            }
        }

        function closePdf() {
            pdfModal.style.display = 'none';
            document.body.style.overflow = 'auto';
            pdfContainer.innerHTML = '';
            currentPdf = null;
        }

        function renderSongs() {
            const raw = searchInput.value;
            const term = normalizeStr(raw);
            clearSearchBtn.classList.toggle('hidden', raw === "");

            const filtered = songDatabase.filter(s => {
                const matchesSearch = normalizeStr(s.titolo).includes(term) || normalizeStr(s.tags).includes(term);
                const matchesFilter = currentFilter === 'all' || s.tonalita === currentFilter;
                return matchesSearch && matchesFilter;
            }).sort((a, b) => a.titolo.localeCompare(b.titolo));

            resultsList.innerHTML = '';
            resultsCount.innerText = filtered.length > 0 ? `${filtered.length} canti trovati` : '';
            document.getElementById('emptyState').classList.toggle('hidden', filtered.length > 0);

            filtered.forEach(song => {
                const card = document.createElement('div');
                card.className = "song-card bg-white p-5 rounded-2xl shadow-sm border border-stone-100 flex items-center justify-between cursor-pointer active:bg-amber-50";
                card.onclick = () => openPdf(song.fileName, song.titolo);
                
                const isM = song.tonalita === 'M';
                card.innerHTML = `
                    <div class="flex-1 pr-4">
                        <h3 class="font-bold text-stone-800 text-lg">${song.titolo}</h3>
                        <span class="inline-block mt-1 px-2.5 py-0.5 rounded-full text-[10px] font-bold uppercase ${isM ? 'bg-blue-50 text-blue-600' : 'bg-pink-50 text-pink-600'}">
                            ${isM ? 'Maschile' : 'Femminile'}
                        </span>
                    </div>
                    <div class="w-10 h-10 flex items-center justify-center bg-stone-50 text-stone-300 rounded-full">
                        <i data-lucide="chevron-right" class="w-5 h-5"></i>
                    </div>
                `;
                resultsList.appendChild(card);
            });
            lucide.createIcons();
        }

        function setFilter(f) {
            currentFilter = f;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.id === `btn-${f}`));
            renderSongs();
        }

        function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }
        
        window.onscroll = () => {
            const btn = document.getElementById('backToTop');
            btn.style.display = (window.scrollY > 300) ? "block" : "none";
        };

        searchInput.addEventListener('input', renderSongs);
        clearSearchBtn.onclick = () => { searchInput.value = ""; renderSongs(); searchInput.focus(); };

        window.onload = () => { 
            introOverlay.classList.remove('hidden-intro');
            renderSongs(); 
            lucide.createIcons(); 
        };
    </script>
</body>
</html>
